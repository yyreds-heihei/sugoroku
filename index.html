<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>認知症予防すごろく</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  min-height: 100vh; overflow-x: hidden;
  background: #87ceeb;
}

#landscape-bg {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ===== スタート ===== */
#screen-start {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px 24px; text-align: center;
}
.start-card {
  background: rgba(255,255,255,0.93);
  border-radius: 28px; padding: 36px 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  max-width: 520px; width: 100%;
}
.start-card h1 { font-size: 44px; font-weight: bold; color: #2d5a27; margin-bottom: 8px; line-height: 1.2; }
.start-card .subtitle { font-size: 22px; color: #666; margin-bottom: 24px; }
.start-info p { font-size: 20px; color: #333; margin-bottom: 10px; line-height: 1.6; }
.start-info p:last-child { margin-bottom: 0; }

/* ===== ゲーム画面 ===== */
#screen-game { display: none; position: relative; z-index: 10; padding: 10px 10px 24px; min-height: 100vh; }

.game-header {
  background: rgba(45,90,39,0.92); color: #fff;
  border-radius: 16px; padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; backdrop-filter: blur(4px);
}
.game-header h2 { font-size: 20px; font-weight: bold; }
.game-header .turn-info { font-size: 18px; }

.score-bar {
  background: rgba(255,255,255,0.88);
  border-radius: 14px; padding: 8px 12px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 10px; backdrop-filter: blur(4px);
}
.score-bar .item { font-size: 16px; color: #333; }
.score-bar .item strong { color: #2d5a27; font-size: 19px; }

.progress-wrap { margin-bottom: 10px; }
.progress-bar { background: rgba(255,255,255,0.5); border-radius: 12px; height: 16px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg,#4caf50,#8bc34a); height: 100%; border-radius: 12px; transition: width 0.5s ease; }
.progress-label { font-size: 14px; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); margin-top: 2px; text-align: right; }

/* ===== ボード ===== */
.board-wrap {
  background: rgba(255,255,255,0.82);
  border-radius: 20px; padding: 10px 6px;
  margin-bottom: 10px;
  backdrop-filter: blur(6px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  overflow-x: auto;
}
.board-inner { min-width: 630px; }
.board-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
.board-row:last-child { margin-bottom: 0; }

.cell {
  width: 58px; height: 60px;
  border-radius: 8px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 10px; font-weight: bold;
  color: #333; text-align: center;
  border: 2px solid #ccc;
  position: relative; flex-shrink: 0;
  transition: transform 0.2s, box-shadow 0.2s;
}
.cell.start-cell  { background: #c8e6c9; border-color: #4caf50; }
.cell.goal-cell   { background: #fff9c4; border-color: #f9a825; }
.cell.ch-word     { background: #e3f2fd; border-color: #1976d2; }
.cell.ch-illust   { background: #f3e5f5; border-color: #7b1fa2; }
.cell.ch-math     { background: #fce4ec; border-color: #c2185b; }
.cell.ch-know     { background: #e8f5e9; border-color: #2e7d32; }
.cell.bonus-adv   { border-width: 3px; border-color: #e65100; }
.cell.bonus-back  { border-width: 3px; border-color: #c62828; }
.cell.bonus-rest  { border-width: 3px; border-color: #37474f; }
.cell.current {
  transform: scale(1.15);
  box-shadow: 0 4px 16px rgba(255,87,34,0.5);
  border-color: #ff5722 !important; border-width: 3px !important;
  z-index: 2;
}
.cell .cell-icon { font-size: 15px; line-height: 1.2; }
.cell .cell-tag  { font-size: 7px; color: #555; line-height: 1.2; }
.cell .cell-num  { font-size: 7px; color: #aaa; }
.cell .bonus-badge { position: absolute; top: -6px; right: -6px; font-size: 11px; }
.cell .token {
  position: absolute; top: -13px; right: -4px;
  font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
  animation: float 1.5s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

/* ===== 操作エリア ===== */
.action-area {
  background: rgba(255,255,255,0.9);
  border-radius: 20px; padding: 16px;
  text-align: center; margin-bottom: 10px;
  backdrop-filter: blur(6px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}
/* ===== サイコロポップアップ ===== */
#dice-popup {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  align-items: center; justify-content: center;
  background-color: rgba(30,60,30,0.72);
  background-image:
    linear-gradient(rgba(255,255,255,0.12) 2px, transparent 2px),
    linear-gradient(90deg, rgba(255,255,255,0.12) 2px, transparent 2px);
  background-size: 48px 48px;
  backdrop-filter: blur(2px);
}
#dice-popup.show { display: flex; animation: popIn 0.18s ease-out; }
@keyframes popIn {
  from { opacity:0; } to { opacity:1; }
}
.dice-popup-card {
  background: rgba(255,255,255,0.96);
  border-radius: 28px;
  padding: 28px 36px 24px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.35);
  min-width: 240px;
}
.dice-popup-card .popup-label {
  font-size: 22px; color: #333; margin-bottom: 18px; font-weight: bold;
}
/* ボタンフェーズ */
#dice-phase-btn { }
.btn-roll-big {
  background: #2d5a27; color: #fff;
  font-size: 32px; padding: 20px 52px;
  border-radius: 18px; border: none; cursor: pointer;
  font-family: inherit; font-weight: bold;
  transition: transform 0.1s, filter 0.1s;
  box-shadow: 0 4px 16px rgba(45,90,39,0.4);
}
.btn-roll-big:active { transform: scale(0.95); filter: brightness(0.9); }
/* サイコロ＋結果フェーズ */
#dice-phase-roll { display: none; }
.dice-popup-card .result-label {
  font-size: 36px; font-weight: bold; color: #2d5a27;
  margin-top: 16px; min-height: 48px;
}
/* ===== 3Dサイコロ ===== */
.dice-3d-wrap {
  perspective: 360px;
  width: 96px; height: 96px;
  margin: 0 auto;
}
.dice-cube {
  width: 96px; height: 96px;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(0deg) rotateY(0deg);
  transition: transform 0.35s ease-out;
}
.dice-cube.rolling {
  animation: cubeRoll 0.75s ease-in-out;
}
@keyframes cubeRoll {
  0%   { transform: rotateX(0deg)   rotateY(0deg); }
  15%  { transform: rotateX(160deg) rotateY(80deg); }
  30%  { transform: rotateX(310deg) rotateY(200deg); }
  45%  { transform: rotateX(470deg) rotateY(340deg); }
  60%  { transform: rotateX(580deg) rotateY(460deg); }
  75%  { transform: rotateX(670deg) rotateY(540deg); }
  90%  { transform: rotateX(700deg) rotateY(570deg); }
  100% { transform: rotateX(720deg) rotateY(576deg); }
}
.dice-face {
  position: absolute;
  width: 96px; height: 96px;
  background: #fff;
  border: 2.5px solid #ccc;
  border-radius: 14px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  padding: 10px; gap: 3px;
  box-shadow: inset 0 0 6px rgba(0,0,0,0.08);
  backface-visibility: hidden;
}
.dice-face.face-1 { transform: translateZ(48px); }
.dice-face.face-6 { transform: rotateY(180deg) translateZ(48px); }
.dice-face.face-2 { transform: rotateY(90deg)  translateZ(48px); }
.dice-face.face-5 { transform: rotateY(-90deg) translateZ(48px); }
.dice-face.face-3 { transform: rotateX(-90deg) translateZ(48px); }
.dice-face.face-4 { transform: rotateX(90deg)  translateZ(48px); }
.dice-face .dot {
  border-radius: 50%;
  background: #1a1a2e;
  width: 16px; height: 16px;
  margin: auto;
}
.dice-face span:not(.dot) { display: block; }
.action-message { font-size: 20px; color: #333; margin-bottom: 12px; font-weight: bold; min-height: 28px; }

/* ===== ボタン ===== */
.btn {
  display: inline-block; border: none; cursor: pointer;
  border-radius: 16px; font-weight: bold;
  font-family: inherit; transition: transform 0.1s, filter 0.1s;
}
.btn:active { transform: scale(0.96); filter: brightness(0.92); }
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-primary   { background: #2d5a27; color: #fff; font-size: 26px; padding: 16px 40px; }
.btn-secondary { background: #1565c0; color: #fff; font-size: 22px; padding: 12px 28px; }
.btn-success   { background: #2e7d32; color: #fff; font-size: 22px; padding: 12px 28px; }
.btn-large     { font-size: 30px; padding: 20px 48px; }

/* ===== モーダル ===== */
#challenge-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 200;
  align-items: center; justify-content: center; padding: 16px;
}
#challenge-modal.show { display: flex; }
.modal-box {
  background: #fff; border-radius: 24px;
  padding: 24px 20px; max-width: 540px; width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.28); text-align: center;
  max-height: 92vh; overflow-y: auto;
}
.modal-box h3 { font-size: 26px; margin-bottom: 6px; }
.modal-box .ch-desc { font-size: 19px; color: #555; margin-bottom: 14px; }

/* タイマー */
.timer-wrap { margin-bottom: 12px; }
.timer-outer { background: #eee; border-radius: 8px; height: 12px; overflow: hidden; }
.timer-fill  { background: #1976d2; height: 100%; border-radius: 8px; transition: width 1s linear; }
.timer-label { font-size: 16px; color: #555; margin-top: 3px; }

/* 言葉記憶 */
.memory-words { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
.memory-word {
  background: #e3f2fd; border: 2px solid #1976d2;
  border-radius: 12px; padding: 10px 16px;
  font-size: 28px; font-weight: bold; color: #1565c0;
}
.answer-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.answer-btn {
  border: 2px solid #1976d2; background: #fff;
  color: #1565c0; font-size: 21px; font-weight: bold;
  padding: 10px 16px; border-radius: 12px; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.answer-btn:hover  { background: #e3f2fd; }
.answer-btn.sel    { background: #bbdefb; }
.answer-btn.correct{ background: #c8e6c9 !important; border-color: #388e3c; color: #1b5e20; }
.answer-btn.wrong  { background: #ffcdd2 !important; border-color: #d32f2f; color: #b71c1c; }

/* イラスト記憶 */
.illust-grid {
  display: flex; gap: 14px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 14px;
}
.illust-card {
  background: #f3e5f5; border: 2px solid #7b1fa2;
  border-radius: 16px; padding: 12px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  min-width: 90px;
}
.illust-card .big-emoji { font-size: 48px; line-height: 1; }
.illust-card .emoji-label { font-size: 14px; color: #4a148c; font-weight: bold; }
.illust-choice-grid { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.illust-btn {
  background: #f3e5f5; border: 2px solid #7b1fa2;
  border-radius: 14px; padding: 10px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; font-family: inherit; transition: background 0.15s;
  min-width: 80px;
}
.illust-btn .big-emoji { font-size: 38px; line-height: 1; }
.illust-btn .emoji-label { font-size: 13px; color: #4a148c; font-weight: bold; }
.illust-btn:hover  { background: #e1bee7; }
.illust-btn.sel    { background: #ce93d8; border-color: #6a1b9a; }
.illust-btn.correct{ background: #c8e6c9 !important; border-color: #388e3c; }
.illust-btn.correct .emoji-label { color: #1b5e20; }
.illust-btn.wrong  { background: #ffcdd2 !important; border-color: #d32f2f; }
.illust-btn.wrong  .emoji-label { color: #b71c1c; }

/* 計算 */
.math-question { font-size: 44px; font-weight: bold; color: #c2185b; margin: 14px 0; }
.math-choices  { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.math-btn {
  background: #fce4ec; border: 2px solid #c2185b;
  color: #880e4f; font-size: 28px; font-weight: bold;
  padding: 12px 22px; border-radius: 14px; cursor: pointer;
  font-family: inherit; min-width: 80px; transition: background 0.15s;
}
.math-btn:hover { background: #f8bbd0; }
.math-btn.correct { background: #c8e6c9; border-color: #388e3c; color: #1b5e20; }
.math-btn.wrong   { background: #ffcdd2; border-color: #d32f2f; color: #b71c1c; }

/* 知識クイズ */
.know-question { font-size: 26px; font-weight: bold; color: #1b5e20; margin: 14px 0 18px; line-height: 1.4; }
.know-choices  { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.know-btn {
  background: #e8f5e9; border: 2px solid #2e7d32;
  color: #1b5e20; font-size: 22px; font-weight: bold;
  padding: 12px 18px; border-radius: 14px; cursor: pointer;
  font-family: inherit; min-width: 110px; transition: background 0.15s;
}
.know-btn:hover  { background: #c8e6c9; }
.know-btn.correct{ background: #c8e6c9; border-color: #388e3c; color: #1b5e20; }
.know-btn.wrong  { background: #ffcdd2; border-color: #d32f2f; color: #b71c1c; }

/* フィードバック */
.feedback { font-size: 24px; font-weight: bold; margin: 12px 0; min-height: 32px; }
.feedback.ok { color: #2e7d32; }
.feedback.ng { color: #c62828; }

/* 休み */
.rest-icon { font-size: 60px; margin-bottom: 10px; }
.rest-modal h3 { font-size: 26px; margin-bottom: 8px; color: #e65100; }
.rest-modal p  { font-size: 19px; color: #555; }

/* ===== ゴール ===== */
#screen-goal {
  display: none; position: relative; z-index: 10;
  min-height: 100vh; align-items: center;
  justify-content: center; flex-direction: column;
  padding: 40px 20px; text-align: center;
}
#screen-goal h1 { font-size: 48px; font-weight: bold; color: #f9a825; margin-bottom: 10px; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.result-card {
  background: rgba(255,255,255,0.93);
  border-radius: 24px; padding: 24px 32px;
  margin-bottom: 16px; max-width: 480px; width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}
.result-card p { font-size: 22px; color: #333; margin-bottom: 8px; }
.result-card .big-score { font-size: 52px; font-weight: bold; color: #2d5a27; }
.result-card .score-sub { font-size: 18px; color: #777; }
.result-card .comment   { font-size: 20px; color: #333; }
</style>
</head>

// ===== ボード描画（10列×10行）=====
function buildBoard() {
  const wrap = document.getElementById('board-rows');
  wrap.innerHTML = '';
  const rows = Math.ceil(TOTAL / COLS);
  let currentEl = null;
  for (let r=0; r<rows; r++) {
    const row = document.createElement('div');
    row.className = 'board-row';
    for (let c=0; c<COLS; c++) {
      const i = r%2===0 ? r*COLS+c : r*COLS+(COLS-1-c);
      if (i >= TOTAL) { row.appendChild(document.createElement('div')); continue; }
      const cell = CELLS[i];
      const div  = document.createElement('div');
      const cur  = i === S.pos;
      let cls = 'cell ';
      if (i===0)          cls += 'start-cell';
      else if (i===TOTAL-1) cls += 'goal-cell';
      else { cls += CELL_META[cell.type].cls; }
      if (cell.bonus) cls += ' bonus-'+cell.bonus.replace(/\d/g,'');
      if (cur) { cls += ' current'; currentEl = div; }
      div.className = cls;

      let icon='', tag='';
      if (i===0)          { icon='🌸'; tag='スタート'; }
      else if (i===TOTAL-1){ icon='🏆'; tag='ゴール！'; }
      else { const m=CELL_META[cell.type]; icon=m.icon; tag=m.tag; }

      const badge = cell.bonus ? `<span class="bonus-badge">${BONUS_ICON[cell.bonus]}</span>` : '';
      const token = cur ? '<span class="token">🧑</span>' : '';
      div.innerHTML = `${badge}${token}<span class="cell-icon">${icon}</span><span class="cell-tag">${tag}</span><span class="cell-num">${i+1}</span>`;
      row.appendChild(div);
    }
    wrap.appendChild(row);
  }
  if (currentEl) {
    setTimeout(() => currentEl.scrollIntoView({ behavior:'smooth', block:'center', inline:'center' }), 100);
  }
}

  document.getElementById('word-score').textContent   = S.wordScore;
  document.getElementById('illust-score').textContent = S.illustScore;
  document.getElementById('math-score').textContent   = S.mathScore;
  document.getElementById('know-score').textContent   = S.knowScore;
  document.getElementById('total-score').textContent  = tot;
  document.getElementById('total-q').textContent      = S.totalQ;
}

// ===== サイコロポップアップ制御 =====
function showDicePopup(label) {
  document.getElementById('popup-label').textContent = label || 'サイコロをふってください';
  document.getElementById('dice-phase-btn').style.display  = '';
  document.getElementById('dice-phase-roll').style.display = 'none';
  document.getElementById('result-label').textContent = '';
  document.getElementById('dice-popup').classList.add('show');
}
function hideDicePopup() {
  document.getElementById('dice-popup').classList.remove('show');
}

// ===== サイコロを振る =====
const ROLL_MS = 800;

function rollDice() {
  if (S.rolling) return;
  S.rolling = true;

  document.getElementById('popup-label').textContent = 'ふっています…';
  document.getElementById('result-label').textContent = '';

  // ボタンを隠してサイコロを表示
  const phaseBtn  = document.getElementById('dice-phase-btn');
  const phaseRoll = document.getElementById('dice-phase-roll');
  phaseBtn.style.display  = 'none';
  phaseRoll.style.display = 'block';

  const cube = document.getElementById('dice-cube');
  const v    = Math.floor(Math.random()*6)+1;

  // display 切り替え後に2フレーム待ってからアニメーション開始
  cube.style.transition = 'none';
  cube.style.transform  = 'rotateX(0deg) rotateY(0deg)';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      cube.classList.add('rolling');
    });
  });

  // アニメ終了後（ROLL_MS）に出た目を確定
  setTimeout(() => {
    cube.classList.remove('rolling');
    cube.style.transition = 'none';
    cube.style.transform  = 'rotateX(0deg) rotateY(0deg)';
    void cube.offsetWidth;
    cube.style.transition = 'transform 0.35s ease-out';
    cube.style.transform  = FACE_ROT[v];
  }, ROLL_MS);

  // 結果テキストを表示
  setTimeout(() => {
    document.getElementById('popup-label').textContent    = '出た目は…';
    document.getElementById('result-label').textContent   = `${v}`;
    document.getElementById('action-message').textContent = `${v} マス進みます！`;
  }, ROLL_MS + 400);

  // ポップアップを閉じて駒を動かす
  setTimeout(() => {
    hideDicePopup();
    stepMove(v);
  }, ROLL_MS + 1400);
}

function stepMove(steps) {
  if (S.skipNext) {
    S.skipNext=false; S.turn++; S.rolling=false;
    document.getElementById('action-message').textContent='1回休みでした';
    showDicePopup(`💤 1回お休み　次のターンをどうぞ`);
    return;
  }
  const target=Math.min(S.pos+steps,TOTAL-1);
  document.getElementById('action-message').textContent=`${steps} マス進みます！`;
  let cur=S.pos;
  const iv=setInterval(()=>{
    cur++; S.pos=cur; buildBoard(); updateHUD();
    if(cur>=target){ clearInterval(iv); setTimeout(landOn,400); }
  },300);
}

function landOn() {
  if (S.pos===TOTAL-1) { showGoal(); return; }
  const t=CELLS[S.pos].type;
  if      (t==='word')   showWordMemory();
  else if (t==='illust') showIllustMemory();
  else if (t==='math')   showMath();
  else if (t==='know')   showKnow();
  else nextTurn();
}

function afterChallenge() {
  const cell=CELLS[S.pos];
  if (!cell.bonus) { nextTurn(); return; }
  const box=document.getElementById('modal-content');
  const modal=document.getElementById('challenge-modal');
  if (cell.bonus==='rest') {
    box.innerHTML=`<div class="rest-modal">
      <div class="rest-icon">💤</div>
      <h3>1回 お休み</h3>
      <p>次のターンはお休みです。<br>ゆっくり深呼吸しましょう。</p>
      <button class="btn btn-secondary" style="margin-top:18px" onclick="applyBonus()">わかりました</button>
    </div>`;
    S.skipNext=true; modal.classList.add('show');
  } else {
    const n=cell.bonus==='adv3'?3:cell.bonus==='adv2'?2:-2;
    const msg=n>0?`🎉 ボーナス！ ${n}マス進みます！`:`😢 ${Math.abs(n)}マス戻ります…`;
    box.innerHTML=`<div style="padding:8px 0">
      <div style="font-size:52px;margin-bottom:10px">${n>0?'🎉':'😢'}</div>
      <h3 style="font-size:26px;margin-bottom:8px">${msg}</h3>
      <p style="font-size:18px;color:#555;margin-bottom:18px">チャレンジのごほうびです！</p>
      <button class="btn btn-success" onclick="applyBonus()">進む</button>
    </div>`;
    window._bonusN=n; modal.classList.add('show');
  }
}

window.applyBonus=function(){
  document.getElementById('challenge-modal').classList.remove('show');
  const cell=CELLS[S.pos];
  if (cell.bonus==='rest'){ nextTurn(); return; }
  S.pos=Math.max(0,Math.min(TOTAL-1,S.pos+(window._bonusN||0)));
  buildBoard(); updateHUD();
  if (S.pos===TOTAL-1){ showGoal(); return; }
  nextTurn();
};

function nextTurn(){
  S.turn++; S.rolling=false;
  document.getElementById('action-message').textContent='サイコロをふってください';
  showDicePopup(`第 ${S.turn} ターン　サイコロをふってください`);
}

// ===== 言葉の記憶 =====
function showWordMemory() {
  const set=WORD_SETS[S.wordIdx%WORD_SETS.length]; S.wordIdx++; S.totalQ++;
  const modal=document.getElementById('challenge-modal');
  const box=document.getElementById('modal-content');
  let sec=5;
  function renderShow(){
    box.innerHTML=`
      <h3>🧠 言葉の記憶クイズ</h3>
      <p class="ch-desc">下の言葉を覚えてください</p>
      <div class="timer-wrap">
        <div class="timer-outer"><div class="timer-fill" id="tf" style="width:100%"></div></div>
        <div class="timer-label" id="tl">${sec}秒</div>
      </div>
      <div class="memory-words">${set.words.map(w=>`<div class="memory-word">${w}</div>`).join('')}</div>
      <p style="font-size:15px;color:#999;margin-top:6px">時間が来たら答えてもらいます</p>`;
    const iv=setInterval(()=>{
      sec--;
      const tf=document.getElementById('tf'), tl=document.getElementById('tl');
      if(tf) tf.style.width=(sec/5*100)+'%';
      if(tl) tl.textContent=sec+'秒';
      if(sec<=0){ clearInterval(iv); renderAnswer(); }
    },1000);
  }
  function renderAnswer(){
    const choices=shuffle([...set.words,...shuffle(set.dist).slice(0,6-set.words.length)]);
    window._memWords=set.words; window._memSel=[];
    box.innerHTML=`
      <h3>🧠 言葉の記憶クイズ</h3>
      <p class="ch-desc">覚えていた言葉を全部選んでください（${set.words.length}つ）</p>
      <div class="answer-buttons" id="abtn">
        ${choices.map(w=>`<button class="answer-btn" onclick="toggleWord(this,'${w}')">${w}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div><div id="ca"></div>`;
  }
  modal.classList.add('show'); renderShow();
}

window.toggleWord=function(btn,w){
  if(btn.classList.contains('correct')||btn.classList.contains('wrong')) return;
  const sel=window._memSel;
  if(sel.includes(w)){ sel.splice(sel.indexOf(w),1); btn.classList.remove('sel'); }
  else { sel.push(w); btn.classList.add('sel'); }
  document.getElementById('ca').innerHTML=
    sel.length===window._memWords.length
      ? `<button class="btn btn-secondary" style="margin-top:10px" onclick="checkWord()">答え合わせ</button>` : '';
};

window.checkWord=function(){
  const sel=window._memSel, cor=window._memWords;
  document.querySelectorAll('.answer-btn').forEach(b=>{
    const w=b.textContent;
    if(cor.includes(w)) b.className='answer-btn correct';
    else if(sel.includes(w)) b.className='answer-btn wrong';
  });
  const ok=sel.length===cor.length&&sel.every(w=>cor.includes(w));
  const fb=document.getElementById('fb');
  fb.className='feedback '+(ok?'ok':'ng');
  fb.textContent=ok?'🎉 すばらしい！ 全問正解！':`正解は「${cor.join('・')}」でした`;
  if(ok) S.wordScore++;
  updateHUD();
  document.getElementById('ca').innerHTML=`<button class="btn btn-success" style="margin-top:12px" onclick="closeModal()">次へ進む</button>`;
};

// ===== 絵の記憶 =====
function showIllustMemory() {
  const set=ILLUST_SETS[S.illustIdx%ILLUST_SETS.length]; S.illustIdx++; S.totalQ++;
  const modal=document.getElementById('challenge-modal');
  const box=document.getElementById('modal-content');
  let sec=6;
  function renderShow(){
    box.innerHTML=`
      <h3>🖼 絵の記憶クイズ</h3>
      <p class="ch-desc">下の絵を覚えてください</p>
      <div class="timer-wrap">
        <div class="timer-outer"><div class="timer-fill" id="tf" style="width:100%;background:#7b1fa2"></div></div>
        <div class="timer-label" id="tl">${sec}秒</div>
      </div>
      <div class="illust-grid">
        ${set.items.map(it=>`
          <div class="illust-card">
            <span class="big-emoji">${it.e}</span>
            <span class="emoji-label">${it.l}</span>
          </div>`).join('')}
      </div>
      <p style="font-size:15px;color:#999;margin-top:6px">時間が来たら答えてもらいます</p>`;
    const iv=setInterval(()=>{
      sec--;
      const tf=document.getElementById('tf'), tl=document.getElementById('tl');
      if(tf) tf.style.width=(sec/6*100)+'%';
      if(tl) tl.textContent=sec+'秒';
      if(sec<=0){ clearInterval(iv); renderAnswer(); }
    },1000);
  }
  function renderAnswer(){
    const correctKeys=set.items.map(it=>it.l);
    const allItems=shuffle([...set.items,...shuffle(set.dist).slice(0,6-set.items.length)]);
    window._illustCor=correctKeys; window._illustSel=[];
    box.innerHTML=`
      <h3>🖼 絵の記憶クイズ</h3>
      <p class="ch-desc">さっき見た絵を全部選んでください（${set.items.length}つ）</p>
      <div class="illust-choice-grid" id="igrid">
        ${allItems.map(it=>`
          <button class="illust-btn" onclick="toggleIllust(this,'${it.l}')">
            <span class="big-emoji">${it.e}</span>
            <span class="emoji-label">${it.l}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div><div id="ca"></div>`;
  }
  modal.classList.add('show'); renderShow();
}

window.toggleIllust=function(btn,label){
  if(btn.classList.contains('correct')||btn.classList.contains('wrong')) return;
  const sel=window._illustSel;
  if(sel.includes(label)){ sel.splice(sel.indexOf(label),1); btn.classList.remove('sel'); }
  else { sel.push(label); btn.classList.add('sel'); }
  document.getElementById('ca').innerHTML=
    sel.length===window._illustCor.length
      ? `<button class="btn btn-secondary" style="margin-top:10px" onclick="checkIllust()">答え合わせ</button>` : '';
};

window.checkIllust=function(){
  const sel=window._illustSel, cor=window._illustCor;
  document.querySelectorAll('.illust-btn').forEach(b=>{
    const lbl=b.querySelector('.emoji-label').textContent;
    if(cor.includes(lbl)) b.className='illust-btn correct';
    else if(sel.includes(lbl)) b.className='illust-btn wrong';
  });
  const ok=sel.length===cor.length&&sel.every(l=>cor.includes(l));
  const fb=document.getElementById('fb');
  fb.className='feedback '+(ok?'ok':'ng');
  fb.textContent=ok?'🎉 すばらしい！ 全問正解！':`正解は「${cor.join('・')}」でした`;
  if(ok) S.illustScore++;
  updateHUD();
  document.getElementById('ca').innerHTML=`<button class="btn btn-success" style="margin-top:12px" onclick="closeModal()">次へ進む</button>`;
};

// ===== 計算 =====
function showMath(){
  const prob=MATH[S.mathIdx%MATH.length]; S.mathIdx++; S.totalQ++;
  const box=document.getElementById('modal-content');
  box.innerHTML=`
    <h3>🔢 計算クイズ</h3>
    <p class="ch-desc">答えを選んでください</p>
    <div class="math-question">${prob.q}</div>
    <div class="math-choices">
      ${shuffle(prob.ch).map(c=>`<button class="math-btn" onclick="checkMath(this,${c},${prob.ans})">${c}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div><div id="ca"></div>`;
  document.getElementById('challenge-modal').classList.add('show');
}

window.checkMath=function(btn,chosen,ans){
  document.querySelectorAll('.math-btn').forEach(b=>b.disabled=true);
  const ok=chosen===ans;
  btn.className='math-btn '+(ok?'correct':'wrong');
  if(!ok) document.querySelectorAll('.math-btn').forEach(b=>{ if(+b.textContent===ans) b.className='math-btn correct'; });
  const fb=document.getElementById('fb');
  fb.className='feedback '+(ok?'ok':'ng');
  fb.textContent=ok?'🎉 正解！ すばらしい！':`正解は ${ans} でした`;
  if(ok) S.mathScore++;
  updateHUD();
  document.getElementById('ca').innerHTML=`<button class="btn btn-success" style="margin-top:14px" onclick="closeModal()">次へ進む</button>`;
};

// ===== 知識クイズ =====
function showKnow(){
  const prob=KNOW[S.knowIdx%KNOW.length]; S.knowIdx++; S.totalQ++;
  const box=document.getElementById('modal-content');
  box.innerHTML=`
    <h3>🌿 知識クイズ</h3>
    <p class="ch-desc">正しいものを選んでください</p>
    <div class="know-question">${prob.q}</div>
    <div class="know-choices">
      ${shuffle(prob.ch).map(c=>`<button class="know-btn" onclick="checkKnow(this,'${c}','${prob.ans}')">${c}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div><div id="ca"></div>`;
  document.getElementById('challenge-modal').classList.add('show');
}

window.checkKnow=function(btn,chosen,ans){
  document.querySelectorAll('.know-btn').forEach(b=>b.disabled=true);
  const ok=chosen===ans;
  btn.className='know-btn '+(ok?'correct':'wrong');
  if(!ok) document.querySelectorAll('.know-btn').forEach(b=>{ if(b.textContent===ans) b.className='know-btn correct'; });
  const fb=document.getElementById('fb');
  fb.className='feedback '+(ok?'ok':'ng');
  fb.textContent=ok?'🎉 正解！ すばらしい！':`正解は「${ans}」でした`;
  if(ok) S.knowScore++;
  updateHUD();
  document.getElementById('ca').innerHTML=`<button class="btn btn-success" style="margin-top:14px" onclick="closeModal()">次へ進む</button>`;
};

window.closeModal=function(){
  document.getElementById('challenge-modal').classList.remove('show');
  afterChallenge();
};

// ===== ゴール =====
function showGoal(){
  document.getElementById('screen-game').style.display='none';
  const g=document.getElementById('screen-goal');
  g.style.display='flex';
  const tot=S.wordScore+S.illustScore+S.mathScore+S.knowScore;
  document.getElementById('score-display').textContent=tot;
  document.getElementById('score-label').textContent=`点 / ${S.totalQ}問中`;
  document.getElementById('r-word').textContent=S.wordScore;
  document.getElementById('r-illust').textContent=S.illustScore;
  document.getElementById('r-math').textContent=S.mathScore;
  document.getElementById('r-know').textContent=S.knowScore;
  const pct=S.totalQ>0?tot/S.totalQ:0;
  document.getElementById('result-comment').textContent=
    pct===1?'🏆 パーフェクト！すごいです！':
    pct>=0.7?'🌟 よくできました！また挑戦してみてください！':
    pct>=0.4?'👍 がんばりました！次はもっとできます！':
    '😊 挑戦してくれてありがとう！また一緒にやりましょう！';
}

// ===== ゲーム管理 =====
function startGame(){
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-game').style.display='block';
  S={pos:0,turn:1,wordScore:0,illustScore:0,mathScore:0,knowScore:0,
     totalQ:0,rolling:false,skipNext:false,
     wordIdx:0,illustIdx:0,mathIdx:0,knowIdx:0};
  initDice();
  const cube=document.getElementById('dice-cube');
  cube.style.transition='none';
  cube.style.transform=FACE_ROT[1];
  buildBoard(); updateHUD();
  showDicePopup('第 1 ターン　サイコロをふってください');
}

function resetGame(){
  document.getElementById('screen-goal').style.display='none';
  document.getElementById('screen-start').style.display='flex';
}
